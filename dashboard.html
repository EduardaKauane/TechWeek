<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Administrativo · Tech Week</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="card header-card">
      <h1 class="page-title">Dashboard Administrativo</h1>
      <p class="page-subtitle">Gestão de inscrições da Tech Week</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="card stat-card">
        <div class="stat-icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="stat-info">
          <p class="stat-label">Participantes</p>
          <p class="stat-value" id="stat-participantes">0</p>
        </div>
      </div>

      <div class="card stat-card">
        <div class="stat-icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </div>
        <div class="stat-info">
          <p class="stat-label">Palestrantes</p>
          <p class="stat-value" id="stat-palestrantes">0</p>
        </div>
      </div>

      <div class="card stat-card">
        <div class="stat-icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
            <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
            <line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>
          </svg>
        </div>
        <div class="stat-info">
          <p class="stat-label">Coffee Break</p>
          <p class="stat-value" id="stat-coffee">0</p>
        </div>
      </div>

      <div class="card stat-card">
        <div class="stat-icon-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="14" x="2" y="3" rx="2"/>
            <line x1="8" x2="16" y1="21" y2="21"/>
            <line x1="12" x2="12" y1="17" y2="21"/>
          </svg>
        </div>
        <div class="stat-info">
          <p class="stat-label">Projetos</p>
          <p class="stat-value" id="stat-projetos">0</p>
        </div>
      </div>
    </div>

    <!-- Search & Filter -->
    <div class="card search-bar">
      <div class="search-input-wrap">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" id="search-input" placeholder="Buscar por nome ou email...">
      </div>
      <select id="filter-status">
        <option value="">Todos os status</option>
        <option value="pendente">Pendente</option>
        <option value="aceito">Aceito</option>
        <option value="negado">Negado</option>
      </select>
    </div>

    <!-- Participantes -->
    <div class="card section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <h2>Participantes Inscritos (<span id="count-participantes">0</span>)</h2>
        </div>
      </div>
      <div id="participantes-list" class="inscricoes-list"></div>
    </div>

    <!-- Palestrantes -->
    <div class="card section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </div>
          <h2>Palestrantes Inscritos (<span id="count-palestrantes">0</span>)</h2>
        </div>
      </div>
      <div id="palestrantes-list" class="inscricoes-list"></div>
    </div>

    <!-- Coffee Break -->
    <div class="card section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 8h1a4 4 0 1 1 0 8h-1"/>
              <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/>
              <line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/>
            </svg>
          </div>
          <h2>Participantes do Coffee Break (<span id="count-coffee">0</span>)</h2>
        </div>
      </div>
      <div id="coffee-list" class="inscricoes-list"></div>
    </div>

    <!-- Projetos -->
    <div class="card section">
      <div class="section-header">
        <div class="section-title">
          <div class="section-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="14" x="2" y="3" rx="2"/>
              <line x1="8" x2="16" y1="21" y2="21"/>
              <line x1="12" x2="12" y1="17" y2="21"/>
            </svg>
          </div>
          <h2>Apresentação de Projetos (<span id="count-projetos">0</span>)</h2>
        </div>
      </div>
      <div id="projetos-list" class="inscricoes-list"></div>
    </div>

  </div>

  <!-- Confirmation Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 id="modal-title">Confirmar ação</h3>
      <p id="modal-message">Tem certeza?</p>
      <div id="modal-select-wrap" class="modal-select-wrap hidden">
        <label class="select-label">Novo status</label>
        <select id="modal-select">
          <option value="pendente">Pendente</option>
          <option value="aceito">Aceito</option>
          <option value="negado">Negado</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="btn-modal-cancel" class="btn btn-secondary">Cancelar</button>
        <button id="btn-modal-confirm" class="btn btn-primary">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
