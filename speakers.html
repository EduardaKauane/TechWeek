<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seção de Palestrantes</title>
    <link rel="stylesheet" href="speakers.css">
</head>
<body>
    <section class="palestrantes">
        <h1>Palestrantes</h1>
        <p>Profissionais renomados compartilhando conhecimento e experiências.</p>

        <!-- Os palestrantes serão inseridos aqui dinamicamente -->
        <div id="palestrantes-container">
            <!-- Card palestrante 1 -->
            <div class="card-palestrante">
                <img src="" alt="Foto de Dra. Ana Silva">
                <h2>Dra. Ana Silva</h2>
                <p>Machine Learning na Prática</p>
            </div>
            <!-- Card palestrante 2 -->
            <div class="card-palestrante">
                <img src="" alt="Foto de Prof. Carlos Mendes">
                <h2>Prof. Carlos Mendes</h2>
                <p>Deep Learning e Visão Computacional</p>
            </div>
            <!-- Card palestrante 3 -->
            <div class="card-palestrante">
                <img src="" alt="Foto de Dra. Beatriz Costa">
                <h2>Dra. Beatriz Costa</h2>
                <p>IA na Saúde Digital</p>
            </div>
            <!-- Card palestrante 4 -->
            <div class="card-palestrante">
                <img src="" alt="Foto de Prof. Roberto Alves">
                <h2>Prof. Roberto Alves</h2>
                <p>Ética e Inteligência Artificial</p>
            </div>
        </div>
    </section>

    <script src="speakers.js"></script>
</body>
</html>
