<!DOCTYPE html>
<html lang="pt-br" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição de Palestrante — Tech Week</title>
  <link rel="icon" href="css/imgs/unicesumar-removebg-preview.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () { const t = localStorage.getItem('tw-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
  </script>
</head>
<body>
  <div class="form-container">
    <a href="index.html" class="form-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Voltar
    </a>
    <h2>Inscrição de Palestrante</h2>
    <p>Envie sua proposta de palestra</p>

    <input id="pal-nome"     type="text"  placeholder="Nome completo"    class="campo-obrigatorio">
    <input id="pal-telefone" type="text"  placeholder="DDD + Telefone"   class="campo-obrigatorio campo-telefone">
    <input id="pal-email"    type="email" placeholder="Email"            class="campo-obrigatorio campo-email">
    <select id="pal-curso" class="campo-obrigatorio" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;cursor:pointer">
      <option value="" disabled selected>Selecione seu curso</option>
      <option value="ADS">Análise e Desenvolvimento de Sistemas - ADS</option>
      <option value="ENG">Engenharia de Software - ENG</option>
    </select>
    <input id="pal-tema"     type="text"  placeholder="Tema da palestra" class="campo-obrigatorio">
    <textarea id="pal-briefing" placeholder="Descreva sua palestra" class="campo-obrigatorio"></textarea>
    <textarea id="pal-bio" placeholder="Biografia — apresentação pessoal para o evento" class="campo-obrigatorio"></textarea>

    <label class="check-item">
      <input type="checkbox" id="pal-exp">
      <span>Possuo experiência como palestrante</span>
    </label>
    <div id="exp-detail" style="display:none;margin-bottom:14px">
      <textarea id="pal-exp-desc" placeholder="Descreva sua experiência como palestrante"></textarea>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px">Currículo (PDF — opcional)</label>
      <input type="file" id="pal-curriculo" accept=".pdf,.doc,.docx" style="font-size:13px;color:var(--text-2);width:100%">
    </div>

    <label class="range-label" for="tempoRange">Tempo necessário: <span id="tempoValor">40 minutos</span></label>
    <input type="range" min="40" max="60" step="5" value="40" id="tempoRange">
    <p class="range-hint">As palestras devem ter entre 40 e 60 minutos</p>

    <div id="form-erro" class="erro-msg" style="display:none"></div>

    <button class="btn-submit" onclick="enviarPalestrante()">Enviar proposta</button>
  </div>

  <script src="js/script.js"></script>
  <script>
    const API = 'https://techweek-production-fedb.up.railway.app';

    document.getElementById('pal-exp').addEventListener('change', function () {
      document.getElementById('exp-detail').style.display = this.checked ? 'block' : 'none';
    });

    async function enviarPalestrante() {
      const nome      = document.getElementById('pal-nome').value.trim();
      const telefone  = document.getElementById('pal-telefone').value.trim();
      const email     = document.getElementById('pal-email').value.trim();
      const curso     = document.getElementById('pal-curso').value;
      const tema      = document.getElementById('pal-tema').value.trim();
      const briefing  = document.getElementById('pal-briefing').value.trim();
      const bio       = document.getElementById('pal-bio').value.trim();
      const duracao   = document.getElementById('tempoValor').textContent;
      const temExp    = document.getElementById('pal-exp').checked;
      const expDesc   = document.getElementById('pal-exp-desc').value.trim();
      const curriculo = document.getElementById('pal-curriculo').files[0];
      const erroEl    = document.getElementById('form-erro');

      if (!nome || !telefone || !email || !curso || !tema || !briefing || !bio) {
        erroEl.textContent = '❗ Preencha todos os campos obrigatórios.';
        erroEl.style.display = 'block';
        return;
      }
      erroEl.style.display = 'none';

      const btn = document.querySelector('.btn-submit');
      btn.textContent = 'Enviando...';
      btn.disabled = true;

      try {
        const fd = new FormData();
        fd.append('nome',      nome);
        fd.append('telefone',  telefone);
        fd.append('email',     email);
        fd.append('curso',     curso);
        fd.append('tema',      tema);
        fd.append('briefing',  briefing);
        fd.append('biografia', bio);
        fd.append('duracao',   duracao);
        if (temExp && expDesc) fd.append('experiencia', expDesc);
        if (curriculo) fd.append('curriculo', curriculo);

        const res  = await fetch(`${API}/inscricao-palestrante`, { method: 'POST', body: fd });
        const json = await res.json();

        if (!res.ok || json.success === false) {
          throw new Error(json.error || `HTTP ${res.status}`);
        }

        sessionStorage.setItem('tw-toast', JSON.stringify({ type: 'success', message: 'Proposta enviada! Entraremos em contato em breve.' }));
        window.location.href = 'index.html';
      } catch (err) {
        erroEl.textContent = `❗ Erro ao enviar: ${err.message}`;
        erroEl.style.display = 'block';
        btn.textContent = 'Enviar proposta';
        btn.disabled = false;
      }
    }
  </script>

  <!-- VLibras -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
