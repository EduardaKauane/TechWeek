<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<script src="js/script.js" defer></script>
<title>Inscrição</title>
</head>

<body>

<div class="form-container">

    <h2>Inscrição de Participante</h2>
    <p>Preencha os dados abaixo</p>

    <input type="text" placeholder="Nome completo" class="campo-obrigatorio">
    <input type="text" placeholder="RA" class="campo-obrigatorio campo-ra">
    <input type="text" placeholder="Curso" class="campo-obrigatorio">
    <input type="text" placeholder="Semestre" class="campo-obrigatorio">

    <label class="check-item">
        <input type="checkbox">
        <span>Desejo participar do Coffee Break</span>
    </label>

    <!-- CHECK PROJETO -->
    <label class="check-item">
        <input type="checkbox" id="checkProjeto">
        <span>Desejo apresentar um projeto</span>
    </label>

    <!-- CAMPOS QUE APARECEM -->
    <div id="camposProjeto" style="display: none;">
        <input type="text" placeholder="Digite o título do seu projeto" class="campo-obrigatorio"><br>
        <textarea placeholder="Descreva seu projeto" class="campo-obrigatorio"></textarea><br>
    </div>

    <button onclick="finalizar()">Confirmar Inscrição</button>

    <button class="btn-voltar-icon" onclick="voltarPagina()">
        ← voltar
    </button>

</div>

</body>
</html>
