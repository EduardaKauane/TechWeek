<!DOCTYPE html>
<html lang="pt-br" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição de Participante — Tech Week</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231e3a8a'/><text x='50' y='68' font-size='54' font-weight='800' fill='white' text-anchor='middle' font-family='Arial'>TW</text></svg>" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () { const t = localStorage.getItem('tw-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
  </script>
</head>
<body>
  <div class="form-container">
    <a href="index.html" class="form-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Voltar
    </a>
    <h2>Inscrição de Participante</h2>
    <p>Preencha os dados abaixo</p>

    <input id="p-nome"     type="text"  placeholder="Nome completo"  class="campo-obrigatorio">
    <input id="p-ra"       type="text"  placeholder="RA"              class="campo-obrigatorio campo-ra">
    <input id="p-curso"    type="text"  placeholder="Curso"           class="campo-obrigatorio">
    <input id="p-semestre" type="text"  placeholder="Semestre"        class="campo-obrigatorio">
    <input id="p-email"    type="email" placeholder="Email"           class="campo-obrigatorio campo-email">

    <label class="check-item">
      <input type="checkbox" id="p-coffee">
      <span>Desejo participar do Coffee Break</span>
    </label>

    <label class="check-item">
      <input type="checkbox" id="p-projeto">
      <span>Desejo apresentar um projeto</span>
    </label>

    <div id="camposProjeto" style="display:none">
      <input id="p-proj-titulo" type="text" placeholder="Título do projeto">
      <textarea id="p-proj-desc" placeholder="Descreva seu projeto"></textarea>
    </div>

    <div id="form-erro" class="erro-msg" style="display:none"></div>

    <button class="btn-submit" onclick="enviarParticipante()">Confirmar Inscrição</button>
  </div>

  <script src="js/script.js"></script>
  <script>
    const API = 'http://localhost:3000';

    document.getElementById('p-projeto').addEventListener('change', function() {
      document.getElementById('camposProjeto').style.display = this.checked ? 'block' : 'none';
    });

    async function enviarParticipante() {
      const nome     = document.getElementById('p-nome').value.trim();
      const ra       = document.getElementById('p-ra').value.trim();
      const curso    = document.getElementById('p-curso').value.trim();
      const semestre = document.getElementById('p-semestre').value.trim();
      const email    = document.getElementById('p-email').value.trim();
      const coffee   = document.getElementById('p-coffee').checked;
      const projeto  = document.getElementById('p-projeto').checked;
      const erroEl   = document.getElementById('form-erro');

      if (!nome || !ra || !curso || !semestre || !email) {
        erroEl.textContent = '❗ Preencha todos os campos obrigatórios.';
        erroEl.style.display = 'block';
        return;
      }
      erroEl.style.display = 'none';

      const btn = document.querySelector('.btn-submit');
      btn.textContent = 'Enviando...';
      btn.disabled = true;

      try {
        await fetch(`${API}/inscricao`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tipo: 'participantes', nome, ra, curso, semestre, email }),
        });

        if (coffee) {
          await fetch(`${API}/inscricao`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'coffeeBreak', nome, email }),
          });
        }

        if (projeto) {
          const titulo = document.getElementById('p-proj-titulo').value.trim();
          const desc   = document.getElementById('p-proj-desc').value.trim();
          await fetch(`${API}/inscricao`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tipo: 'projetos', nome: titulo || nome, equipe: nome, email, descricao: desc }),
          });
        }

        showToast('success', 'Inscrição confirmada! Aguardamos você na Tech Week.');
        document.querySelector('.form-container').innerHTML = `
          <div style="text-align:center;padding:32px 0">
            <div style="width:56px;height:56px;background:#16a34a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 style="color:var(--text);margin-bottom:8px">Inscrição confirmada!</h2>
            <p style="color:var(--text-muted);margin-bottom:24px">Sua inscrição foi enviada com sucesso.<br>Aguardamos você na Tech Week!</p>
            <a href="index.html" style="display:inline-block;padding:11px 24px;background:#1e3a8a;color:#fff;border-radius:9px;font-weight:600;font-size:14px">Voltar ao site</a>
          </div>`;
      } catch {
        showToast('error', 'Erro ao conectar com o servidor. Verifique se o backend está rodando.');
        btn.textContent = 'Confirmar Inscrição';
        btn.disabled = false;
      }
    }
  </script>

  <!-- VLibras -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
